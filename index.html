<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Participant Ranking App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏆 Ranking Application</h1>
        
        <!-- Admin Section -->
        <div class="section" id="adminSection">
            <h2>Setup (Admin)</h2>
            <div class="form-group">
                <label for="sessionName">Session Name:</label>
                <input type="text" id="sessionName" placeholder="e.g., Best Pizza Toppings">
            </div>
            <div class="form-group">
                <label for="itemInput">Add Items to Rank:</label>
                <input type="text" id="itemInput" placeholder="Enter an item">
                <button onclick="addItem()">Add Item</button>
            </div>
            <div id="itemsList"></div>
            <button class="primary-btn" onclick="startSession()">Start Ranking Session</button>
        </div>

        <!-- Participant Section -->
        <div class="section hidden" id="participantSection">
            <h2 id="sessionTitle"></h2>
            <div class="form-group">
                <label for="participantName">Your Name:</label>
                <input type="text" id="participantName" placeholder="Enter your name">
            </div>
            <div class="ranking-area">
                <p>Drag items to rank them (top = most preferred):</p>
                <ul id="rankingList" class="ranking-list"></ul>
            </div>
            <button class="primary-btn" onclick="submitRanking()">Submit Ranking</button>
        </div>

        <!-- Results Section -->
        <div class="section hidden" id="resultsSection">
            <h2>Results</h2>
            <div id="participantsList"></div>
            <h3>Aggregated Rankings</h3>
            <div id="aggregatedResults"></div>
            <button onclick="resetApp()">Start New Session</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
